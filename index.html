<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Malla de Lulú Nerda</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --bg: #fff8fc;
      --bg-soft: #fff1f7;
      --card: rgba(255, 255, 255, 0.9);
      --card-strong: #ffffff;
      --text: #70475d;
      --muted: #9c7c8f;
      --primary: #f4aac8;
      --primary-strong: #e98bb6;
      --secondary: #f9d5e6;
      --accent: #ffe4f0;
      --success: #eefbe9;
      --success-border: #9dd2a1;
      --locked: #f7edf3;
      --locked-border: #dfc8d4;
      --shadow: 0 16px 38px rgba(231, 151, 186, 0.16);
      --shadow-soft: 0 10px 22px rgba(231, 151, 186, 0.12);
      --radius: 24px;
      --radius-sm: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffeaf4 0%, transparent 30%),
        radial-gradient(circle at top right, #ffe2f0 0%, transparent 25%),
        linear-gradient(180deg, #fffafd 0%, #fff4f9 50%, #fffafd 100%);
    }

    .page {
      padding: 26px 18px 40px;
      max-width: 1900px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,241,247,.94));
      border: 1px solid rgba(239, 189, 214, 0.86);
      border-radius: 34px;
      padding: 30px 30px 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 26px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 34px;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,0.2), transparent 40%, rgba(255,255,255,0.22));
    }

    h1 {
      margin: 0 0 10px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 2.8vw, 3rem);
      letter-spacing: 0.02em;
      color: #c16b97;
    }

    .subtitle {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
      max-width: 1050px;
      font-size: 1rem;
      font-weight: 600;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .pill {
      background: rgba(255,255,255,0.9);
      border: 1px solid #efc8da;
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 17px;
      font-size: 0.96rem;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      box-shadow: var(--shadow-soft);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid #edc8d9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(245px, 1fr));
      gap: 18px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .semester {
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,246,250,.95));
      border: 1px solid rgba(240, 199, 219, 0.86);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 16px;
      min-height: 280px;
      position: relative;
    }

    .semester::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(90deg, #f9bdd6, #ffddeb, #f7c6dc);
    }

    .semester h2 {
      margin: 10px 0 14px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      color: #b1638a;
      text-align: center;
    }

    .subjects {
      display: grid;
      gap: 12px;
    }

    .subject {
      border-radius: var(--radius-sm);
      padding: 15px 15px 13px;
      position: relative;
      border: 1px solid transparent;
      background: var(--card-strong);
      box-shadow: var(--shadow-soft);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .18s ease;
      cursor: pointer;
      user-select: none;
      outline: none;
    }

    .subject:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(231, 151, 186, 0.18);
    }

    .subject.approved {
      background: linear-gradient(180deg, #fbfff9, #eefce9);
      border-color: var(--success-border);
    }

    .subject.locked {
      background: linear-gradient(180deg, #fcf6fa, #f5edf2);
      border-color: var(--locked-border);
      opacity: 0.88;
      cursor: not-allowed;
    }

    .subject-title {
      font-size: 0.98rem;
      line-height: 1.38;
      font-weight: 800;
      margin: 0 0 10px;
      padding-right: 32px;
    }

    .subject-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      border-radius: 999px;
      padding: 5px 11px;
      font-weight: 800;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
    }

    .badge.available {
      background: #fff3f9;
      color: #b85c8c;
      border-color: #f3c9dc;
    }

    .badge.approved {
      background: #ecfbe9;
      color: #4f8f5d;
      border-color: #bce0bf;
    }

    .badge.locked {
      background: #f2e7ee;
      color: #907787;
      border-color: #d9c3cf;
    }

    .checkmark {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 29px;
      height: 29px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff4fa;
      border: 1px solid #efcade;
      color: #ca709b;
      font-size: 0.96rem;
      font-weight: 800;
    }

    .subject.approved .checkmark {
      background: #ebf9e9;
      border-color: #b8dbbc;
      color: #5a9c67;
    }

    .subject.locked .checkmark {
      background: #f1e7ed;
      color: #a28b98;
      border-color: #dcc8d3;
    }

    .tooltip {
      position: fixed;
      max-width: 290px;
      background: rgba(96, 58, 78, 0.96);
      color: white;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 0.84rem;
      line-height: 1.45;
      box-shadow: 0 14px 30px rgba(82, 44, 64, 0.25);
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .12s ease, transform .12s ease;
      z-index: 100;
      backdrop-filter: blur(6px);
      font-weight: 700;
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(10, minmax(225px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 16px 12px 30px;
      }

      .hero {
        padding: 22px 20px;
      }

      .grid {
        grid-template-columns: repeat(10, minmax(205px, 1fr));
        gap: 14px;
      }

      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Malla de Lulú Nerda</h1>
      <p class="subtitle">
        Haz click sobre cada materia para marcarla como aprobada.
        Las Asignaturas Con Prerrequisitos Se Desbloquean Automáticamente Cuando Cumples Lo Necesario
      </p>

      <div class="stats">
        <div class="pill" id="progressText">0 De 47 Materias Aprobadas</div>
        <div class="pill" id="percentText">Progreso: 0%</div>
        <div class="pill" id="availableText">Disponibles Para Cursar: 0</div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="expandAvailable">Ver Materias Disponibles</button>
        <button class="btn-secondary" id="resetProgress">Reiniciar Progreso</button>
      </div>
    </section>

    <main class="grid" id="grid"></main>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const semesters = [
      {
        title: 'Primer Semestre',
        subjects: [
          { id: 'fund_admin', name: 'Fundamentos De Administración' },
          { id: 'fund_cont_fin', name: 'Fundamentos De Contabilidad Financiera' },
          { id: 'fund_econ', name: 'Fundamentos De Economía' },
          { id: 'hab_com', name: 'Habilidades Comunicativas En Ciencias De Gestión' },
          { id: 'calc_diff', name: 'Cálculo Diferencial' }
        ]
      },
      {
        title: 'Segundo Semestre',
        subjects: [
          { id: 'teo_org_1', name: 'Teoría Organizacional I', prereqs: ['fund_admin'] },
          { id: 'fund_cont_gestion', name: 'Fundamentos De Contabilidad De Gestión', prereqs: ['fund_cont_fin'] },
          { id: 'micro', name: 'Microeconomía', prereqs: ['calc_diff', 'fund_econ'] },
          { id: 'informatica', name: 'Informática Aplicada Para La Gestión De Datos E Información' },
          { id: 'prob_est', name: 'Probabilidad Y Estadística Fundamental', prereqs: ['calc_diff'] }
        ]
      },
      {
        title: 'Tercer Semestre',
        subjects: [
          { id: 'teo_org_2', name: 'Teoría Organizacional II', prereqs: ['teo_org_1'] },
          { id: 'opt_disc_1', name: 'Optativa Disciplinar', alwaysUnlocked: true },
          { id: 'macro', name: 'Macroeconomía', prereqs: ['fund_econ'] },
          { id: 'analitica_1', name: 'Analítica De Negocios I', prereqs: ['calc_diff', 'prob_est', 'informatica'] },
          { id: 'libre_1', name: 'Libre Elección', alwaysUnlocked: true }
        ]
      },
      {
        title: 'Cuarto Semestre',
        subjects: [
          { id: 'internacionalizacion', name: 'Internacionalización De La Empresa', prereqs: ['teo_org_2'] },
          { id: 'fund_finanzas', name: 'Fundamentos De Finanzas', prereqs: ['fund_cont_fin'] },
          { id: 'libre_2', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'opt_disc_2', name: 'Optativa Disciplinar', alwaysUnlocked: true },
          { id: 'derecho_comercial', name: 'Derecho Comercial, General Y Sociedades', prereqs: ['teo_org_2'] },
          { id: 'ingles_4', name: 'Inglés IV', alwaysUnlocked: true }
        ]
      },
      {
        title: 'Quinto Semestre',
        subjects: [
          { id: 'derecho_laboral', name: 'Derecho De Las Relaciones Laborales', prereqs: ['teo_org_2'] },
          { id: 'fund_mercadeo', name: 'Fundamentos De Mercadeo', prereqs: ['analitica_1'] },
          { id: 'gestion_rh', name: 'Gestión De Recursos Humanos', prereqs: ['teo_org_2'] },
          { id: 'opt_fb_1', name: 'Optativa De Formación Básica', alwaysUnlocked: true },
          { id: 'operaciones_1', name: 'Gestión De Las Operaciones I', prereqs: ['fund_cont_gestion', 'prob_est'] }
        ]
      },
      {
        title: 'Sexto Semestre',
        subjects: [
          { id: 'emprendimiento', name: 'Emprendimiento Enfocado En La Generación De Valor', prereqs: ['fund_mercadeo', 'operaciones_1'] },
          { id: 'finanzas_av', name: 'Finanzas Avanzadas', prereqs: ['fund_finanzas'] },
          { id: 'comp_org', name: 'Comportamiento Organizacional', prereqs: ['gestion_rh', 'derecho_laboral'] },
          { id: 'sig', name: 'Sistemas De Información Gerencial', prereqs: ['fund_mercadeo', 'fund_finanzas', 'operaciones_1', 'gestion_rh'] },
          { id: 'operaciones_2', name: 'Gestión De Las Operaciones II', prereqs: ['operaciones_1', 'fund_mercadeo'] }
        ]
      },
      {
        title: 'Séptimo Semestre',
        subjects: [
          { id: 'estrategia', name: 'Estrategia', prereqs: ['internacionalizacion'] },
          { id: 'estrategia_merc', name: 'Estrategia De Mercadeo', prereqs: ['fund_mercadeo'] },
          { id: 'opt_fb_2', name: 'Optativa De Formación Básica', alwaysUnlocked: true },
          { id: 'app_emp', name: 'Aplicaciones Empresariales', prereqs: ['sig'] },
          { id: 'proyectos', name: 'Diseño, Gestión Y Evaluación De Proyectos', prereqs: ['finanzas_av', 'operaciones_2'] }
        ]
      },
      {
        title: 'Octavo Semestre',
        subjects: [
          { id: 'libre_3', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_4', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_5', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_6', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'opt_disc_3', name: 'Optativa Disciplinar', alwaysUnlocked: true }
        ]
      },
      {
        title: 'Noveno Semestre',
        subjects: [
          { id: 'libre_7', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_8', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_9', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_10', name: 'Libre Elección', alwaysUnlocked: true },
          { id: 'libre_11', name: 'Libre Elección', alwaysUnlocked: true }
        ]
      },
      {
        title: 'Décimo Semestre',
        subjects: [
          { id: 'trabajo_grado', name: 'Trabajo De Grado', alwaysUnlocked: true }
        ]
      }
    ];

    const STORAGE_KEY = 'malla_admin_empresas_unal_bogota_v2';
    const grid = document.getElementById('grid');
    const tooltip = document.getElementById('tooltip');
    const progressText = document.getElementById('progressText');
    const percentText = document.getElementById('percentText');
    const availableText = document.getElementById('availableText');
    const resetButton = document.getElementById('resetProgress');
    const expandAvailableButton = document.getElementById('expandAvailable');

    const allSubjects = semesters.flatMap((semester, semesterIndex) =>
      semester.subjects.map(subject => ({
        ...subject,
        semester: semester.title,
        semesterIndex
      }))
    );

    const subjectMap = Object.fromEntries(allSubjects.map(subject => [subject.id, subject]));
    const dependentsMap = {};

    allSubjects.forEach(subject => {
      (subject.prereqs || []).forEach(prereq => {
        if (!dependentsMap[prereq]) dependentsMap[prereq] = [];
        dependentsMap[prereq].push(subject.id);
      });
    });

    let approved = loadApproved();

    function loadApproved() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return new Set(Array.isArray(parsed) ? parsed.filter(id => subjectMap[id]) : []);
      } catch {
        return new Set();
      }
    }

    function saveApproved() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...approved]));
    }

    function isUnlocked(subject) {
      if (subject.alwaysUnlocked) return true;
      if (subject.semesterIndex === 0) return true;
      const prereqs = subject.prereqs || [];
      return prereqs.every(id => approved.has(id));
    }

    function missingPrereqs(subject) {
      return (subject.prereqs || []).filter(id => !approved.has(id)).map(id => subjectMap[id]?.name || id);
    }

    function getStatus(subject) {
      if (approved.has(subject.id)) return 'approved';
      if (isUnlocked(subject)) return 'available';
      return 'locked';
    }

    function getDescendantsToClear(startId, visited = new Set()) {
      const dependents = dependentsMap[startId] || [];
      for (const depId of dependents) {
        if (visited.has(depId)) continue;
        if (approved.has(depId)) {
          visited.add(depId);
          getDescendantsToClear(depId, visited);
        }
      }
      return visited;
    }

    function toggleSubject(id) {
      const subject = subjectMap[id];
      if (!subject) return;

      if (!approved.has(id) && !isUnlocked(subject)) return;

      if (approved.has(id)) {
        approved.delete(id);
        const descendants = [...getDescendantsToClear(id)];
        descendants.forEach(depId => approved.delete(depId));
      } else {
        approved.add(id);
      }

      saveApproved();
      render();
    }

    function createSubjectCard(subject) {
      const status = getStatus(subject);
      const card = document.createElement('article');
      card.className = `subject ${status === 'approved' ? 'approved' : ''} ${status === 'locked' ? 'locked' : ''}`;
      card.tabIndex = status === 'locked' ? -1 : 0;
      card.dataset.id = subject.id;

      const badgeLabel = status === 'approved'
        ? 'Aprobada'
        : status === 'available'
          ? 'Disponible'
          : 'Bloqueada';

      card.innerHTML = `
        <div class="checkmark">${status === 'approved' ? '✓' : status === 'locked' ? '🔒' : '○'}</div>
        <h3 class="subject-title">${subject.name}</h3>
        <div class="subject-meta">
          <span>${subject.prereqs?.length ? `Req: ${subject.prereqs.length}` : 'Sin Requisito'}</span>
          <span class="badge ${status}">${badgeLabel}</span>
        </div>
      `;

      if (status === 'locked') {
        const missing = missingPrereqs(subject);
        card.dataset.tooltip = `Falta Aprobar: ${missing.join(', ')}`;
      }

      card.addEventListener('click', () => toggleSubject(subject.id));
      card.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleSubject(subject.id);
        }
      });

      if (status === 'locked') {
        card.addEventListener('mouseenter', showTooltip);
        card.addEventListener('mousemove', moveTooltip);
        card.addEventListener('mouseleave', hideTooltip);
      }

      return card;
    }

    function showTooltip(event) {
      const text = event.currentTarget.dataset.tooltip;
      if (!text) return;
      tooltip.textContent = text;
      tooltip.classList.add('show');
      moveTooltip(event);
    }

    function moveTooltip(event) {
      const margin = 16;
      const x = Math.min(event.clientX + 18, window.innerWidth - tooltip.offsetWidth - margin);
      const y = Math.min(event.clientY + 18, window.innerHeight - tooltip.offsetHeight - margin);
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltip.classList.remove('show');
    }

    function updateStats() {
      const total = allSubjects.length;
      const approvedCount = approved.size;
      const availableCount = allSubjects.filter(subject => !approved.has(subject.id) && isUnlocked(subject)).length;
      const percent = Math.round((approvedCount / total) * 100);

      progressText.textContent = `${approvedCount} De ${total} Materias Aprobadas`;
      percentText.textContent = `Progreso: ${percent}%`;
      availableText.textContent = `Disponibles Para Cursar: ${availableCount}`;
    }

    function render() {
      grid.innerHTML = '';

      semesters.forEach(semester => {
        const column = document.createElement('section');
        column.className = 'semester';

        const title = document.createElement('h2');
        title.textContent = semester.title;

        const subjectsWrap = document.createElement('div');
        subjectsWrap.className = 'subjects';

        semester.subjects.forEach(subject => {
          subjectsWrap.appendChild(createSubjectCard(subject));
        });

        column.appendChild(title);
        column.appendChild(subjectsWrap);
        grid.appendChild(column);
      });

      updateStats();
    }

    resetButton.addEventListener('click', () => {
      const confirmed = window.confirm('¿Seguro Que Quieres Borrar Todo Tu Progreso Guardado?');
      if (!confirmed) return;
      approved = new Set();
      saveApproved();
      render();
    });

    expandAvailableButton.addEventListener('click', () => {
      const firstAvailable = [...document.querySelectorAll('.subject')].find(card => {
        const id = card.dataset.id;
        const subject = subjectMap[id];
        return subject && !approved.has(id) && isUnlocked(subject);
      });

      if (firstAvailable) {
        firstAvailable.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        firstAvailable.animate(
          [
            { transform: 'scale(1)', boxShadow: '0 10px 22px rgba(231, 151, 186, 0.12)' },
            { transform: 'scale(1.02)', boxShadow: '0 16px 30px rgba(231, 151, 186, 0.24)' },
            { transform: 'scale(1)', boxShadow: '0 10px 22px rgba(231, 151, 186, 0.12)' }
          ],
          { duration: 900, easing: 'ease' }
        );
      }
    });

    render();
  </script>
</body>
</html>
